<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1520"/>
      <stop offset="100%" style="stop-color:#030507"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f5d4"/>
      <stop offset="100%" style="stop-color:#00b4d8"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7b2fff;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#00f5d4;stop-opacity:0.08"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <rect width="512" height="512" rx="110" fill="url(#glow)"/>
  <!-- Rupee symbol -->
  <text x="256" y="300" font-size="265" text-anchor="middle" dominant-baseline="middle"
        font-family="system-ui,-apple-system,sans-serif" font-weight="700" fill="url(#bar)">₹</text>
  <!-- Bottom accent line -->
  <rect x="64" y="408" width="384" height="18" rx="9" fill="url(#bar)" opacity="0.75"/>
  <!-- Corner dots -->
  <circle cx="96"  cy="88"  r="9" fill="#00f5d4" opacity="0.35"/>
  <circle cx="416" cy="88"  r="9" fill="#7b2fff" opacity="0.35"/>
</svg>
